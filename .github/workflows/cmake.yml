name: CMake CI

on:
  push:
    branches: [master, main]
    paths-ignore:
      - "**/*.md"
      - ".vscode/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE*"
  pull_request:
    branches: [master, main]
    paths-ignore:
      - "**/*.md"
      - ".vscode/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE*"
  # Enables triggering the workflow manually (on any branch) from the Actions tab
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      # From the logs, it looks like the needed cache is a little over 8GB. jhrg 4/1/26
      CCACHE_MAXSIZE: 10G
      CCACHE_COMPRESS: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create ccache directory
        run: mkdir -p "$CCACHE_DIR"

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', '.github/workflows/cmake.yml') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxml2-dev \
            libcurl4-openssl-dev \
            uuid-dev \
            libcppunit-dev \
            libtirpc-dev \
            libfl-dev \
            ccache

      - name: Configure (CMake preset)
        run: |
          ccache --zero-stats || true
          cmake --preset ci

      - name: Build
        run: |
          cmake --build --preset ci --parallel "$(nproc)"

      - name: Run tests (if applicable)
        run: |
          ctest --preset ci --output-on-failure --parallel "$(nproc)"

      - name: Show ccache stats
        if: always()
        run: ccache --show-stats || true
